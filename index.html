<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Gallery - Rey de Ases 2026</title>
    
    <!-- Icono de la pestaña y escritorio -->
    <link rel="icon" type="image/png" href="Logomono.png">
    <link rel="apple-touch-icon" href="Logomono.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f0f0f;
            color: #e5e5e5;
            overflow-x: hidden;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-bg {
            background: linear-gradient(135deg, #bf953f, #d4af37, #b38728);
        }

        .folder-card {
            background: #1a1a1a;
            border: 1px solid #333;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .folder-card:hover {
            transform: translateY(-5px);
            border-color: #bf953f;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .character-img {
            width: 120px;
            height: 140px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .sign {
            background: #000;
            border: 1px solid #bf953f;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
            margin-top: -10px;
            z-index: 10;
        }

        .modal {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
        }

        .image-card {
            background: #161616;
            border: 1px solid #222;
            overflow: hidden;
            border-radius: 15px;
            transition: border-color 0.3s;
        }
        
        .image-card:hover {
            border-color: #bf953f;
        }

        .btn-download {
            background: #222;
            color: #bf953f;
            border: 1px solid #bf953f;
            transition: all 0.2s;
        }
        .btn-download:hover {
            background: #bf953f;
            color: #000;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-black border-b border-yellow-900/50 p-6 shadow-2xl">
        <div class="container mx-auto text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold uppercase tracking-widest gold-gradient">Rey de Ases</h1>
            <p class="text-gray-500 mt-2 text-[10px] tracking-[0.3em] uppercase">Catálogo Exclusivo 2026</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        
        <!-- Navegación -->
        <nav id="nav-container" class="mb-8 hidden flex justify-between items-center">
            <button onclick="window.showFolders()" class="text-yellow-500 font-bold uppercase text-xs">
                <i class="fas fa-chevron-left mr-2"></i> Volver
            </button>
            <div class="flex items-center gap-4">
                <span id="sync-status" class="text-[8px] text-zinc-600 uppercase tracking-tighter italic">Sincronizado</span>
                <button id="btn-add-content" onclick="window.openAdminModal()" class="hidden gold-bg text-black px-4 py-2 rounded-full font-bold text-[10px] uppercase shadow-lg hover:scale-105 transition-transform">
                    <i class="fas fa-plus mr-1"></i> Cargar Imagen
                </button>
            </div>
        </nav>

        <!-- VISTA DE CARPETAS -->
        <div id="folders-view" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
            <div onclick="window.openFolder('buenos-dias', 'Buenos Días')" class="folder-card p-6 rounded-2xl flex flex-col items-center">
                <img src="Logomono.png" class="character-img" onerror="this.src='https://img.icons8.com/ios-filled/100/bf953f/monkey.png'">
                <div class="sign">BUENOS DÍAS</div>
            </div>
            <div onclick="window.openFolder('buenas-noches', 'Buenas Noches')" class="folder-card p-6 rounded-2xl flex flex-col items-center">
                <img src="Logomono.png" class="character-img" onerror="this.src='https://img.icons8.com/ios-filled/100/bf953f/monkey.png'">
                <div class="sign">BUENAS NOCHES</div>
            </div>
            <div onclick="window.openFolder('fin-de-semana', 'Buen Finde')" class="folder-card p-6 rounded-2xl flex flex-col items-center">
                <img src="Logomono.png" class="character-img" onerror="this.src='https://img.icons8.com/ios-filled/100/bf953f/monkey.png'">
                <div class="sign">FIN DE SEMANA</div>
            </div>
            <div onclick="window.openFolder('cargando', 'Cargando')" class="folder-card p-6 rounded-2xl flex flex-col items-center">
                <img src="Logomono.png" class="character-img" onerror="this.src='https://img.icons8.com/ios-filled/100/bf953f/monkey.png'">
                <div class="sign">CARGANDO</div>
            </div>
            <div onclick="window.openFolder('publicidad', 'Publicidad')" class="folder-card p-6 rounded-2xl flex flex-col items-center">
                <img src="Logomono.png" class="character-img" onerror="this.src='https://img.icons8.com/ios-filled/100/bf953f/monkey.png'">
                <div class="sign">PUBLICIDAD</div>
            </div>
        </div>

        <!-- VISTA DE IMÁGENES -->
        <div id="images-view" class="hidden">
            <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-2">
                <h2 id="folder-title" class="text-xl font-bold gold-gradient uppercase tracking-widest">Categoría</h2>
                <div id="loading-spinner" class="hidden text-yellow-500 animate-spin"><i class="fas fa-spinner"></i></div>
            </div>
            <div id="images-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <!-- Modal Login -->
    <div id="login-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal">
        <div class="bg-zinc-900 border border-yellow-600 p-8 rounded-2xl max-w-sm w-full shadow-2xl">
            <h3 class="gold-gradient font-bold mb-4 text-center uppercase tracking-tighter text-xl">Acceso VIP</h3>
            <input type="text" id="user" placeholder="Usuario" class="w-full p-3 mb-3 bg-zinc-800 rounded border border-zinc-700 outline-none focus:border-yellow-600 transition-colors">
            <input type="password" id="pass" placeholder="Contraseña" class="w-full p-3 mb-4 bg-zinc-800 rounded border border-zinc-700 outline-none focus:border-yellow-600 transition-colors">
            <button onclick="window.checkLogin()" class="w-full gold-bg text-black font-bold py-3 rounded hover:brightness-110 transition-all uppercase text-sm tracking-widest">Entrar</button>
            <button onclick="window.closeModal('login-modal')" class="w-full text-zinc-500 text-[10px] mt-4 uppercase">Cerrar</button>
        </div>
    </div>

    <!-- Modal Subir Foto -->
    <div id="admin-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal">
        <div class="bg-zinc-900 border border-yellow-600 p-8 rounded-2xl max-w-md w-full shadow-2xl">
            <h3 class="gold-gradient font-bold mb-4 uppercase tracking-widest">Nueva Publicación</h3>
            <div class="space-y-4">
                <input type="text" id="img-name" placeholder="Título de la imagen" class="w-full p-3 bg-zinc-800 rounded border border-zinc-700 outline-none focus:border-yellow-600">
                <input type="text" id="img-url" placeholder="Link directo (Ej: https://i.imgur.com/vHqB4lI.png)" class="w-full p-3 bg-zinc-800 rounded border border-zinc-700 outline-none focus:border-yellow-600">
                <p class="text-[9px] text-zinc-500 px-1 italic">* Los links deben ser directos (terminar en .jpg o .png).</p>
                <button onclick="window.savePhoto()" id="btn-save-action" class="w-full gold-bg text-black font-bold py-3 rounded mt-2 uppercase text-sm tracking-widest shadow-lg">Guardar en la Nube</button>
                <button onclick="window.closeModal('admin-modal')" class="w-full text-zinc-500 text-[10px] mt-2 uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <footer class="p-6 text-center border-t border-zinc-900">
        <button onclick="window.toggleAdminPanel()" id="admin-trigger" class="text-zinc-700 hover:text-yellow-600 text-[10px] uppercase tracking-widest transition-colors">
            Acceso Privado
        </button>
        <p class="text-[8px] text-zinc-800 mt-2">REY DE ASES &copy; 2026</p>
    </footer>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración inyectada por el entorno
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'rey-de-ases-v2';

        let user = null;
        let photos = [];
        let currentCategory = '';
        let isAdmin = false;

        // 1. Autenticación Crítica (Regla 3)
        const initAuth = async () => {
            try {
                // Siempre iniciamos sesión anónima para poder leer/escribir en Firestore
                await signInAnonymously(auth);
            } catch (e) {
                console.error("Auth Error:", e);
                document.getElementById('sync-status').innerText = "Error de conexión";
            }
        };
        initAuth();

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                document.getElementById('sync-status').innerText = "Conectado a la Nube";
                listenPhotos();
            }
        });

        // 2. Escuchar la Nube (Regla 1 y 2)
        function listenPhotos() {
            if (!user) return;
            // Usamos la ruta obligatoria para persistencia en este entorno
            const photosRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
            
            onSnapshot(photosRef, (snapshot) => {
                photos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (currentCategory) renderPhotos();
            }, (error) => {
                console.error("Firestore Listen Error:", error);
                document.getElementById('sync-status').innerText = "Error de sincronización";
            });
        }

        // --- Funciones de Interfaz ---

        window.toggleAdminPanel = () => {
            if (isAdmin) {
                if (confirm("¿Cerrar sesión de administrador?")) {
                    isAdmin = false;
                    document.getElementById('admin-trigger').innerText = "Acceso Privado";
                    document.getElementById('btn-add-content').classList.add('hidden');
                    renderPhotos();
                }
            } else {
                document.getElementById('login-modal').classList.remove('hidden');
            }
        };

        window.checkLogin = () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "Tomas19" && p === "tomas1234") {
                isAdmin = true;
                window.closeModal('login-modal');
                document.getElementById('admin-trigger').innerText = "MODO ADMIN ACTIVO";
                if(currentCategory) document.getElementById('btn-add-content').classList.remove('hidden');
                renderPhotos();
            } else { 
                alert("Usuario o contraseña incorrectos"); 
            }
        };

        window.openFolder = (id, name) => {
            currentCategory = id;
            document.getElementById('folders-view').classList.add('hidden');
            document.getElementById('images-view').classList.remove('hidden');
            document.getElementById('nav-container').classList.remove('hidden');
            document.getElementById('folder-title').innerText = name;
            if(isAdmin) document.getElementById('btn-add-content').classList.remove('hidden');
            renderPhotos();
            window.scrollTo(0,0);
        };

        window.showFolders = () => {
            currentCategory = '';
            document.getElementById('folders-view').classList.remove('hidden');
            document.getElementById('images-view').classList.add('hidden');
            document.getElementById('nav-container').classList.add('hidden');
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.openAdminModal = () => document.getElementById('admin-modal').classList.remove('hidden');

        // 3. Guardar en la Nube (Regla 1)
        window.savePhoto = async () => {
            const name = document.getElementById('img-name').value;
            const url = document.getElementById('img-url').value;
            
            if(!name || !url) return alert("Por favor completa los campos");
            if(!user) return alert("Aún no hay conexión con la nube. Reintenta en 2 segundos.");

            document.getElementById('loading-spinner').classList.remove('hidden');
            
            try {
                const photosRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
                await addDoc(photosRef, {
                    name: name,
                    url: url,
                    category: currentCategory,
                    createdAt: Date.now()
                });
                
                document.getElementById('img-name').value = "";
                document.getElementById('img-url').value = "";
                window.closeModal('admin-modal');
            } catch (e) {
                console.error("Error guardando:", e);
                alert("Error al guardar en la nube. Verifica que estés conectado.");
            } finally {
                document.getElementById('loading-spinner').classList.add('hidden');
            }
        };

        window.deletePhoto = async (id) => {
            if(!isAdmin) return;
            if(confirm("¿Eliminar imagen permanentemente de la nube?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'photos', id));
                } catch (e) {
                    alert("No se pudo eliminar de la nube.");
                }
            }
        };

        window.downloadImage = async (url, filename) => {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename || 'rey-de-ases';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(url, '_blank');
            }
        };

        function renderPhotos() {
            const grid = document.getElementById('images-grid');
            // Filtrar y ordenar por fecha (más nuevos primero)
            const categoryPhotos = photos
                .filter(p => p.category === currentCategory)
                .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            
            if (categoryPhotos.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 border border-zinc-900 rounded-3xl"><p class="text-zinc-700 uppercase text-[10px] tracking-widest">No hay imágenes en esta categoría</p></div>';
                return;
            }

            grid.innerHTML = categoryPhotos.map(p => `
                <div class="image-card group">
                    <div class="aspect-square bg-zinc-900 flex items-center justify-center overflow-hidden">
                        <img src="${p.url}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy" onerror="this.src='https://placehold.co/400x400/111/bf953f?text=Error+en+Link'">
                    </div>
                    <div class="p-4 bg-zinc-950 flex justify-between items-center">
                        <div class="truncate mr-2">
                            <span class="text-[10px] uppercase font-bold gold-gradient block truncate">${p.name}</span>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            ${isAdmin ? `<button onclick="window.deletePhoto('${p.id}')" class="text-zinc-600 hover:text-red-500 p-1"><i class="fas fa-trash"></i></button>` : ''}
                            <button onclick="window.downloadImage('${p.url}', '${p.name}')" class="btn-download px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase flex items-center gap-1">
                                <i class="fas fa-download"></i> Bajar
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
